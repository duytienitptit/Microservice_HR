events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting key definition: bypass rate limiting for /health and /metrics
    map $request_uri $limit_key {
        ~*/health$ "";
        ~*/metrics$ "";
        default $binary_remote_addr;
    }

    # Define rate limiting zone
    limit_req_zone $limit_key zone=api_limit:10m rate=100r/m;

    # Generate Correlation ID if not present
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    # Redirect HTTP (80) to HTTPS (443)
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS (443) Server Block
    server {
        listen 443 ssl;
        server_name localhost;

        # Use Docker internal DNS resolver to avoid stale upstream IPs after container rebuild
        resolver 127.0.0.11 valid=10s ipv6=off;

        # TLS Certificates Configuration
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Apply rate limiting globally to all requests
        limit_req zone=api_limit burst=50 nodelay;

        # Custom JSON error page for 429 Too Many Requests
        error_page 429 = /429.json;
        location = /429.json {
            return 429 '{"success":false,"error":{"code":"TOO_MANY_REQUESTS","message":"Rate limit exceeded. 100 requests per minute allowed. Please try again later.","details":null}}';
            default_type application/json;
        }

        # Core Service — Auth
        location /api/auth {
            set $upstream_core core-service:3001;
            proxy_pass http://$upstream_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # Core Service — Users
        location /api/users {
            set $upstream_core core-service:3001;
            proxy_pass http://$upstream_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # Core Service — Jobs
        location /api/jobs {
            set $upstream_core core-service:3001;
            proxy_pass http://$upstream_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # Core Service — Applications
        location /api/applications {
            set $upstream_core core-service:3001;
            proxy_pass http://$upstream_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
            # Allow large file uploads for CV
            client_max_body_size 5M;
        }

        # AI Service — Interviews
        location /api/interviews {
            set $upstream_ai ai-service:3002;
            proxy_pass http://$upstream_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # AI Service — Chat
        location /api/chat {
            set $upstream_ai ai-service:3002;
            proxy_pass http://$upstream_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # AI Service — Magic Link validation (API)
        location /api/interview/ {
            set $upstream_ai ai-service:3002;
            proxy_pass http://$upstream_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # Assessment Service — Reports
        location /api/reports {
            set $upstream_assessment assessment-service:3004;
            proxy_pass http://$upstream_assessment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # Web Client React SPA (catch-all)
        location / {
            set $upstream_web web-client:80;
            proxy_pass http://$upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $correlation_id;
        }

        # RAG Service is intentionally NOT exposed through the gateway
    }
}

