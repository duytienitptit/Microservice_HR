services:
  # ─── Hạ tầng (Infrastructure) ───────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d core_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "grep -q '00000000:18BD' /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"   # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"    # Web UI to view emails
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ứng dụng (Application) ──────────────────────────────
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./api-gateway/certs:/etc/nginx/certs:ro
    depends_on:
      core-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      assessment-service:
        condition: service_healthy
      web-client:
        condition: service_healthy

  core-service:
    build: ./core-service
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/core_db
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - cv_storage:/storage/cv
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ai-service:
    build: ./ai-service
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/ai_db
      RABBITMQ_URL: amqp://rabbitmq:5672
      CORE_SERVICE_URL: http://core-service:3001
      RAG_SERVICE_URL: http://rag-service:3003
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_API_KEY: ${GEMINI_API_KEY}
      LLM_PROVIDER: gemini
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    volumes:
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  rag-service:
    build: ./rag-service
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      QDRANT_URL: http://qdrant:6333
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: sqlite:////data/rag.db
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - cv_storage:/storage/cv
      - app_logs:/var/log/app
      - rag_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  assessment-service:
    build: ./assessment-service
    environment:
      MONGODB_URL: mongodb://mongodb:27017/assessment_db
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
      CORE_SERVICE_URL: http://core-service:3001
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_API_KEY: ${GEMINI_API_KEY}
      LLM_PROVIDER: gemini
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@support-hr.com}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    volumes:
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web-client:
    build: ./web-client
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Giám sát & Quản lý (Monitoring & Aggregation) ───────
  prometheus:
    image: prom/prometheus:v2.51.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - core-service
      - ai-service
      - rag-service
      - assessment-service

  loki:
    image: grafana/loki:2.9.4
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - app_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.1
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
  cv_storage:
  app_logs:
  rag_data:
