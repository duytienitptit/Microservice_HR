    <script type="text/markdown" id="markdown-source"># PHẦN 1: KIẾN TRÚC MICROSERVICES - HỆ THỐNG AI HR RECRUITER

Chào mừng các bạn thành viên trong đội ngũ phát triển! Tài liệu này sẽ giúp bạn nắm bắt toàn bộ bức tranh kiến trúc hệ thống của dự án **AI HR Recruiter**. 

Nếu bạn đã quen thuộc với việc xây dựng các ứng dụng web dạng đơn khối (Monolith) như một server Node.js/Express hay Django/Python duy nhất chứa cả API, logic nghiệp vụ và kết nối trực tiếp với một database, tài liệu này sẽ dẫn dắt bạn từng bước tiếp cận kiến trúc **Microservices (Vi dịch vụ)** thông qua thực tế dự án của chúng ta.

---

## 1. Giới thiệu về Microservices dưới góc nhìn Web Developer

### 1.1. Monolith (Đơn khối) vs Microservices (Vi dịch vụ)

Trong một ứng dụng **Monolith**, toàn bộ chức năng (quản lý công việc, lưu CV, xử lý AI, gửi mail, quản lý database) đều được đóng gói và chạy chung trong **một process duy nhất**. 

Trong dự án **AI HR Recruiter**, chúng ta chọn kiến trúc **Microservices**. Hệ thống được chia nhỏ thành **4 dịch vụ độc lập**, mỗi dịch vụ chịu trách nhiệm cho một nghiệp vụ duy nhất (Single Responsibility) và chạy trên các container riêng biệt.

#### Bảng so sánh trực quan:

| Tiêu chí | Monolith (Đơn khối) | Microservices (Vi dịch vụ) trong AI HR Recruiter |
| :--- | :--- | :--- |
| **Phân chia mã nguồn** | Chung một repository, tất cả các module nằm chung một thư mục. | Mỗi service có một thư mục riêng biệt (`core-service`, `ai-service`, `rag-service`...), chạy runtime riêng. |
| **Cơ sở dữ liệu** | Một database duy nhất cho toàn bộ hệ thống. | **Database per Service:** Mỗi service sở hữu database riêng (PostgreSQL, MongoDB, SQLite, Qdrant). |
| **Mức độ phụ thuộc** | Lỗi ở một module (ví dụ: tràn bộ nhớ khi đọc file PDF) có thể làm sập toàn bộ server. | Các service hoạt động độc lập. Nếu `assessment-service` lỗi, ứng viên vẫn có thể phỏng vấn bình thường với `ai-service`. |
| **Khả năng mở rộng (Scale)** | Phải scale toàn bộ ứng dụng, gây lãng phí tài nguyên. | Chỉ scale service cần thiết. Ví dụ: Scale `ai-service` lên nhiều container khi có đợt phỏng vấn lớn, giữ nguyên các service khác. |
| **Công nghệ lựa chọn** | Bị giới hạn trong một ngôn ngữ/framework chính. | Linh hoạt chọn công nghệ tối ưu cho từng task (Express/Node.js cho CRUD nhanh, FastAPI/Python cho AI/RAG). |

---

## 2. Thiết kế Kiến trúc Hệ thống AI HR Recruiter

Dưới đây là sơ đồ luồng đi của dữ liệu từ Client qua các lớp hạ tầng đến các service nội bộ:

```mermaid

        Gateway -->|Route /api/auth, /api/jobs, /api/applications| Core[Core Service Port 3001]
        Gateway -->|Route /api/interviews, /api/chat| AIService[AI Service Port 3002]
        Gateway -->|Route /api/reports| AssessService[Assessment Service Port 3004]
        
        %% Giao tiếp nội bộ HTTP
        AIService -->|HTTP query| RAGService[RAG Service Port 3003]

    subgraph Databases ["Lớp Lưu trữ Dữ liệu"]

    end

    %% Ghi chú bảo vệ
    style Gateway fill:#f9f,stroke:#333,stroke-width:2px

    style MQ fill:#ffe3ad,stroke:#ff9a00,stroke-width:2px

### 2.1. Vai trò của 4 Dịch vụ chính
1. **Core Service (Node.js/Express/TypeScript + PostgreSQL):** 
   - Quản lý nhà tuyển dụng (HR), đăng nhập/đăng ký.
   - Quản lý các công việc (Jobs) và hồ sơ ứng viên (Applications).
   - Lưu trữ trạng thái của hồ sơ tuyển dụng.
2. **AI Service (Python/FastAPI + PostgreSQL):**
   - Quản lý các phòng chat phỏng vấn trực tiếp giữa Trợ lý AI và Ứng viên.
   - Sử dụng máy trạng thái điều hướng cuộc trò chuyện qua 5 giai đoạn: Chào hỏi -> Hỏi CV -> Hỏi chuyên môn JD -> Tình huống -> Kết thúc.
3. **RAG Service (Python/FastAPI + Qdrant + SQLite):**
   - Phân tích cú pháp file CV (PDF), băm nhỏ văn bản (chunking) và chuyển đổi thành dạng số (embedding).
   - Lưu trữ các vector vào Qdrant để thực hiện tìm kiếm ngữ nghĩa, cung cấp tài liệu tham khảo cho AI.
4. **Assessment Service (Node.js/TypeScript + MongoDB):**
   - Nhận lịch sử chat sau khi kết thúc phỏng vấn để chấm điểm ứng viên.
   - Tổng hợp báo cáo đánh giá chi tiết và gửi email kết quả cho HR.

### 2.2. Tại sao lại dùng mô hình "Database per Service"?
Nếu tất cả các service dùng chung một Database, chúng ta sẽ gặp hiện tượng **Coupling (Ràng buộc chặt)**. Khi một service thay đổi cấu trúc bảng, các service khác sẽ bị lỗi theo.

Trong hệ thống của chúng ta:
- **Core Service** cần tính toàn vẹn dữ liệu cao (ràng buộc khóa ngoại giữa User, Job, Application) nên dùng **PostgreSQL (Quan hệ)**.
- **Assessment Service** lưu trữ các báo cáo đánh giá có cấu trúc linh hoạt (tùy thuộc vào câu hỏi và tiêu chí chấm điểm thay đổi theo thời gian) nên dùng **MongoDB (Tài liệu - Document DB)**.
- **RAG Service** cần tìm kiếm sự tương đồng giữa các đoạn văn bản dựa trên khoảng cách toán học, nên dùng **Qdrant (Vector DB)** kết hợp **SQLite** để lưu metadata gọn nhẹ.

## 3. Trái tim Hệ thống: API Gateway (Nginx)

Đối với các hệ thống Microservices, client không bao giờ kết nối trực tiếp đến các cổng nội bộ như `3001`, `3002`, `3004`. Thay vào đó, mọi request đều đi qua một chốt chặn duy nhất gọi là **API Gateway** (chúng ta cấu hình bằng **Nginx** chạy ở cổng `80/443`).

### 3.1. Các nhiệm vụ cốt lõi của API Gateway trong dự án
*   **Định tuyến (Routing):** Khi bạn gửi request tới `https://localhost/api/auth/login`, Nginx sẽ đọc tiền tố `/api/auth` và chuyển tiếp (proxy) yêu cầu đến `core-service:3001`.
*   **Ẩn cấu trúc mạng nội bộ:** Client hoàn toàn không biết `rag-service` nằm ở đâu và chạy ở cổng nào. RAG Service được cấu hình chạy nội bộ và **không được cấu hình route** trên Gateway, giúp bảo mật tuyệt đối các file CV và JD gốc.
*   **Tách biệt Cơ chế Xác thực (Authentication Routing):**
    - **Dành cho HR:** Các API như `/api/jobs` (POST/PUT/DELETE) hoặc `/api/applications` yêu cầu mã JWT được gửi kèm trong Header `Authorization: Bearer <token>`.
    - **Dành cho Ứng viên:** Ứng viên không có tài khoản trên hệ thống. Họ truy cập thông qua một **Magic Link** có dạng `https://localhost/interview/<magic-token>`. Gateway sẽ dẫn hướng route này đến `ai-service:3002`. AI Service sẽ tự xác thực token này với Core Service để cho phép ứng viên chat.

### 3.2. Cấu hình Nginx thực tế và Giải thích

Dưới đây là một phần file cấu hình `api-gateway/nginx.conf` của hệ thống:

```nginx
# 1. Định nghĩa giới hạn tần suất yêu cầu (Rate Limiting) để tránh spam
limit_req_zone $limit_key zone=api_limit:10m rate=100r/m;

server {
    listen 443 ssl;
    server_name localhost;

    # 2. Cơ chế giải quyết DNS động của Docker (CỰC KỲ QUAN TRỌNG)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Cấu hình chứng chỉ bảo mật SSL
    ssl_certificate /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # Áp dụng giới hạn Rate Limiting trên toàn hệ thống (tối đa 100 req/phút, burst 50)
    limit_req zone=api_limit burst=50 nodelay;

    # 3. Định tuyến Core Service - Quản lý Đơn ứng tuyển
    location /api/applications {
        # Sử dụng biến $upstream_core thay vì chỉ định cứng host để tránh lỗi DNS cache
        set $upstream_core core-service:3001;
        proxy_pass http://$upstream_core;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $correlation_id; # ID theo dõi luồng log
        
        client_max_body_size 5M; # Cho phép upload CV tối đa 5MB
    }

    # 4. Định tuyến AI Service - Chat Phỏng vấn
    location /api/chat {
        set $upstream_ai ai-service:3002;
        proxy_pass http://$upstream_ai;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $correlation_id;
    }
    
    # 5. Định tuyến đến Client Web App (React)
    location / {
        set $upstream_web web-client:80;
        proxy_pass http://$upstream_web;
    }
}
```

#### Giải thích các điểm kỹ thuật quan trọng trong file cấu hình:
1.  **`resolver 127.0.0.11 valid=10s;`**: Đây là địa chỉ DNS nội bộ của Docker. Khi chúng ta chạy `docker compose up --build` để cập nhật một dịch vụ, Docker sẽ gán cho container đó một IP nội bộ mới. Nếu không có dòng `resolver` và cách khai báo biến `set $upstream_core`, Nginx sẽ cache IP cũ mãi mãi và trả về lỗi `502 Bad Gateway` khi container restart. Cấu hình này buộc Nginx phải refresh DNS sau mỗi 10 giây.
2.  **`X-Correlation-ID`**: Gateway tự tạo ra một mã định danh duy nhất (UUID) cho mỗi request đi vào hệ thống và đính vào HTTP Header. Mã này sẽ được truyền qua toàn bộ các service giúp lập trình viên lọc log để theo dõi chính xác hành vi của một request duy nhất đi qua nhiều service khác nhau.

## 4. Giao tiếp Bất đồng bộ qua RabbitMQ

Trong hệ thống Monolith, khi HR upload CV lên, chương trình sẽ chạy hàm đọc PDF, băm văn bản rồi lưu Database, toàn bộ quá trình mất khoảng 5-10 giây và bắt HR phải chờ trên màn hình với biểu tượng loading. Nếu có 100 CV tải lên cùng lúc, server có thể bị nghẽn và chết.

Để giải quyết vấn đề này, chúng ta sử dụng **Giao tiếp bất đồng bộ hướng sự kiện (Asynchronous Event-Driven)** thông qua **RabbitMQ**.

### 4.1. Luồng xử lý hồ sơ ứng viên (CV Upload & Parse)

```mermaid
sequenceDiagram
    autonumber
    actor HR as Nhà tuyển dụng (HR)
    participant Core as Core Service
    participant MQ as RabbitMQ
    participant RAG as RAG Service

    HR->>Core: POST /api/applications (Upload CV PDF)
    Note over Core: Lưu file vào ổ đĩa,<br/>Tạo Application dạng "CV_PROCESSING"
    Core-->>HR: Phản hồi 201 Created (Nhanh chóng!)
    Note over HR: Màn hình HR hiện trạng thái:<br/>"Đang xử lý CV..."

    Core->>MQ: Publish sự kiện "cv.uploaded"<br/>{ application_id, cv_file_path }
    
    MQ->>RAG: Consume sự kiện "cv.uploaded"
    Note over RAG: Đọc file PDF từ ổ đĩa chung,<br/>Băm nhỏ văn bản,<br/>Tạo Vector Embeddings lưu Qdrant,<br/>Trích xuất Tên & Email bằng Regex
    RAG->>MQ: Publish sự kiện "cv.ready"<br/>{ application_id, extracted_email, extracted_name }
    
    MQ->>Core: Consume sự kiện "cv.ready"
    Note over Core: Cập nhật Tên & Email ứng viên,<br/>Chuyển trạng thái Application sang "READY_FOR_INTERVIEW"
    Note over HR: Màn hình HR tự động cập nhật:<br/>"Sẵn sàng mời phỏng vấn"
```

Nhờ có luồng xử lý này, HR không phải chờ đợi. Core Service chỉ làm nhiệm vụ lưu file nhanh và giao việc nặng (đọc PDF, AI Embeddings) cho RAG Service thông qua RabbitMQ.

### 4.2. Cấu hình kết nối và Xử lý Lỗi trong RabbitMQ

Để đảm bảo hệ thống không bị mất tin nhắn khi gặp lỗi mạng hoặc sập nguồn, chúng ta phải cấu hình RabbitMQ với các cơ chế phòng vệ mạnh mẽ. 

Dưới đây là mã nguồn cấu hình RabbitMQ trong `core-service/src/events/connection.ts`:

```typescript
import amqplib, { ChannelModel, Channel } from 'amqplib';
import logger from '../utils/logger';

let connection: ChannelModel | null = null;
let channel: Channel | null = null;

export async function connectRabbitMQ(url: string): Promise<Channel> {
  if (channel) return channel;

  try {
    const activeConnection = await amqplib.connect(url);
    connection = activeConnection;
    
    const activeChannel = await activeConnection.createChannel();
    channel = activeChannel;

    // 1. Khai báo các Exchange bền vững (durable: true)
    await activeChannel.assertExchange('cv.events', 'direct', { durable: true });
    await activeChannel.assertExchange('dlx.events', 'direct', { durable: true }); // Dead Letter Exchange

    // 2. Khai báo hàng đợi lỗi (Dead Letter Queue - DLQ)
    await activeChannel.assertQueue('dlq.cv.uploaded', { durable: true });
    await activeChannel.bindQueue('dlq.cv.uploaded', 'dlx.events', 'cv.uploaded');

    // 3. Khai báo hàng đợi chính với cấu hình DLX và thời gian sống (TTL)
    await activeChannel.assertQueue('cv.uploaded', {
      durable: true,
      arguments: {
        'x-dead-letter-exchange': 'dlx.events', // Gửi tin nhắn lỗi sang DLX
        'x-message-ttl': 60000,                  // Tin nhắn chỉ tồn tại tối đa 60 giây trong hàng đợi
      },
    });
    await activeChannel.bindQueue('cv.uploaded', 'cv.events', 'cv.uploaded');

    // 4. Lắng nghe sự kiện mất kết nối để tự động reconnect sau 5 giây
    activeConnection.on('close', () => {
      logger.warn({ event: 'rabbitmq.connection.closed' });
      channel = null;
      connection = null;
      setTimeout(() => connectRabbitMQ(url), 5000); 
    });

    return activeChannel;
  } catch (err) {
    logger.error({ event: 'rabbitmq.connection_failed', error: err });
    // Thử kết nối lại sau 5 giây nếu lần đầu thất bại
    await new Promise((resolve) => setTimeout(resolve, 5000));
    return connectRabbitMQ(url);
  }
}
```

#### Giải thích các cơ chế resilience quan trọng trong code RabbitMQ:
1.  **`durable: true`**: Đảm bảo rằng nếu server RabbitMQ bị restart đột ngột, các Exchange và Queue vẫn tự động phục hồi mà không bị xóa mất dữ liệu.
2.  **`x-dead-letter-exchange (DLX)`**: Khi RAG Service cố gắng xử lý một file CV bị lỗi (ví dụ: file PDF bị hỏng hoặc mã hóa không đọc được), tin nhắn xử lý CV đó sẽ bị từ chối (`reject`/`nack`). Thay vì biến mất hoặc bị lặp đi lặp lại vô hạn làm nghẽn hàng đợi, RabbitMQ sẽ tự chuyển tin nhắn lỗi này sang **Dead Letter Queue (DLQ)** (`dlq.cv.uploaded`) để lập trình viên kiểm tra thủ công.
3.  **Tự động Reconnect (`on('close')`)**: Tránh trường hợp container RabbitMQ khởi động chậm hơn các app service hoặc bị restart đột ngột. Hệ thống sẽ tự động lắng nghe và kết nối lại sau mỗi 5 giây mà không làm sập tiến trình Node.js.

## 5. Tóm tắt & Bài học kinh nghiệm cho Web Developer

Khi làm việc trong kiến trúc Microservices của hệ thống AI HR Recruiter, bạn hãy luôn nhớ 3 nguyên tắc vàng:
1.  **Tuyệt đối không truy cập trực tiếp Database của service khác.** Nếu `ai-service` cần kiểm tra trạng thái hồ sơ của ứng viên, nó phải gọi HTTP API đến `core-service` thay vì tự ý kết nối vào database `core_db`.
2.  **Mỗi log ghi ra đều phải đính kèm `correlation_id`.** Điều này giúp bạn dễ dàng tìm lỗi xuyên suốt các service bằng cách tìm kiếm ID tương quan trên hệ thống log tập trung.
3.  **Thiết kế có tính đến khả năng thất bại (Design for Failure).** Hãy luôn bao bọc các lệnh gọi HTTP ngoại vi bằng cơ chế thử lại (retry) hoặc ngắt mạch (circuit breaker) để đảm bảo lỗi ở service này không kéo đổ toàn bộ hệ thống.

# PHẦN 2: CƠ CHẾ AI & RAG PIPELINE - HỆ THỐNG AI HR RECRUITER

Trong phần này, chúng ta sẽ đi sâu vào "bộ não" của hệ thống **AI HR Recruiter**. Hệ thống không chỉ đơn thuần là nhận tin nhắn và phản hồi, mà nó kết hợp hai công nghệ AI tiên tiến:
1.  **RAG (Retrieval-Augmented Generation - Tạo lập tăng cường truy xuất)** để AI hiểu CV của ứng viên và Mô tả công việc (JD).
2.  **LangGraph (Đồ thị trạng thái hội thoại)** để điều hướng cuộc phỏng vấn đi đúng lộ trình chuyên nghiệp.
3.  **LLM Assessment (Chấm điểm thông minh)** dùng Google Gemini để đánh giá ứng viên khách quan và chống ảo giác (hallucination).

## 1. Giới thiệu về RAG & Vector Search

### 1.1. RAG (Retrieval-Augmented Generation) là gì?
Các mô hình ngôn ngữ lớn (LLM) như GPT hay Gemini rất thông minh, nhưng chúng **không biết** ứng viên Nguyễn Văn A là ai, trong CV của họ viết gì, hay doanh nghiệp của bạn đang tuyển vị trí gì với yêu cầu kỹ thuật nào. 

Để giải quyết vấn đề này, thay vì phải train lại (fine-tune) mô hình LLM với chi phí cực kỳ đắt đỏ, chúng ta áp dụng cơ chế **RAG**. Khi AI chuẩn bị đặt câu hỏi hoặc đánh giá ứng viên, nó sẽ chạy một câu truy vấn tìm kiếm nhanh trong cơ sở dữ liệu CV để lấy ra các đoạn thông tin liên quan nhất, sau đó "dán" các thông tin này vào câu lệnh (Prompt) gửi cho LLM.

### 1.2. Quy trình xử lý RAG Pipeline trong `rag-service`

Khi một CV được tải lên, hệ thống thực hiện 4 bước tự động:
1.  **Trích xuất văn bản (Text Extraction):** Dịch vụ `rag-service` dùng thư viện Python (`pdfplumber`) đọc file PDF CV và chuyển thành một chuỗi văn bản thô.
2.  **Chia nhỏ văn bản (Text Splitting):** Một file CV dài không thể gửi toàn bộ vào Vector DB vì sẽ gây loãng thông tin và tốn token. Chúng ta dùng `RecursiveCharacterTextSplitter` chia nhỏ văn bản thành các khối (chunks) khoảng **512 ký tự**, gối đầu lên nhau **50 ký tự** để đảm bảo không mất ngữ cảnh ở ranh giới các đoạn.
3.  **Vector hóa (Embedding generation):** Mỗi đoạn văn bản thô được chạy qua mô hình embedding (mặc định là `all-MiniLM-L6-v2` chạy trực tiếp trên server hoặc OpenAI API) để biến đổi thành một mảng số thực (gọi là vector) đại diện cho ngữ nghĩa của đoạn văn đó.
4.  **Lưu trữ vào Qdrant (Vector DB):** Các vector được lưu vào Qdrant dưới dạng các PointStruct. Mỗi Point chứa tọa độ vector, `application_id` để phân biệt các ứng viên, và `payload` chứa văn bản gốc.

### 1.3. Mã nguồn xử lý Vector trong Qdrant
Dưới đây là cách `rag-service` thực hiện lưu trữ (upsert) và tìm kiếm (search) tương đồng ngữ nghĩa:

```python
# File: rag-service/app/vector_store/qdrant_store.py

from qdrant_client.models import PointStruct, Filter, FieldCondition, MatchValue

class QdrantStore:
    # ... kết nối Qdrant client ...

    def upsert_vectors(self, application_id: str, chunks: list[dict], embeddings: list[list[float]], doc_type: str = "CV"):
        """
        Lưu các đoạn text và vector tương ứng của ứng viên vào Qdrant.
        """
        dimension = len(embeddings[0])
        self.recreate_collection(dimension) # Tạo collection nếu chưa có
        
        points = []
        for idx, (chunk, embedding) in enumerate(zip(chunks, embeddings)):
            point_id = str(uuid.uuid4())
            points.append(PointStruct(
                id=point_id,
                vector=embedding,
                payload={
                    "application_id": application_id,
                    "content": chunk["content"],     # Đoạn text gốc
                    "metadata": chunk["metadata"],   # Số trang, nguồn tài liệu
                    "doc_type": doc_type
                }
            ))
            
        # Đẩy dữ liệu lên Qdrant DB
        self.client.upsert(
            collection_name=self.collection_name,
            points=points
        )

    def search(self, query_text: str, application_id: str, top_k: int = 5) -> list[dict]:
        """
        Tìm kiếm ngữ nghĩa: Nhập câu hỏi thô -> Vector hóa -> Lấy ra các đoạn CV liên quan nhất.
        """
        # 1. Chuyển đổi câu truy vấn thô thành vector
        embedder = get_embedder()
        query_vector = embedder.embed_query(query_text)

        # 2. Tạo bộ lọc (Filter) chỉ tìm kiếm các đoạn thuộc về hồ sơ ứng viên này
        qdrant_filter = Filter(
            must=[
                FieldCondition(
                    key="application_id",
                    match=MatchValue(value=application_id)
                )
            ]
        )
        
        # 3. Thực hiện tìm kiếm khoảng cách Cosine trên Qdrant
        results = self.client.search(
            collection_name=self.collection_name,
            query_vector=query_vector,
            query_filter=qdrant_filter,
            limit=top_k
        )
        
        return [{
            "content": r.payload.get("content"),
            "score": r.score,
            "metadata": r.payload.get("metadata", {})
        } for r in results]
```

## 2. Máy Trạng Thái Điều Hướng Hội Thoại (LangGraph)

Khi phỏng vấn ứng viên, nếu chỉ gửi lịch sử chat trực tiếp cho ChatGPT/Gemini, AI sẽ dễ bị lan man, hỏi đi hỏi lại hoặc không biết khi nào cần kết thúc. Để cuộc phỏng vấn có tính cấu trúc như một buổi phỏng vấn ngoài đời thực, chúng ta xây dựng máy trạng thái bằng **LangGraph**.

### 2.1. Đồ thị trạng thái phỏng vấn (StateGraph)

Chúng ta khai báo một đồ thị có 5 nút (Nodes) tương ứng với 5 giai đoạn phỏng vấn:

```mermaid
stateDiagram-v2
    [*] --> GREETING : route_interview
    GREETING --> EXPERIENCE_REVIEW : Ứng viên trả lời xong chào hỏi
    EXPERIENCE_REVIEW --> TECHNICAL_QUESTIONS : Đặt đủ 3 câu hỏi CV
    TECHNICAL_QUESTIONS --> SCENARIO_QUESTIONS : Đặt đủ 4 câu hỏi JD
    SCENARIO_QUESTIONS --> CLOSING : Đặt đủ 3 câu hỏi tình huống
    CLOSING --> [*] : Kết thúc & Đóng phòng chat
```

### 2.2. Mã nguồn xây dựng Đồ thị và Bộ định tuyến (Router)

Cách xây dựng Đồ thị LangGraph và hàm định tuyến chuyển trạng thái:

```python
# File: ai-service/app/graph/builder.py

from langgraph.graph import StateGraph, END
from app.graph.state import InterviewState
# ... import các node ...

def build_interview_graph():
    workflow = StateGraph(InterviewState)
    
    # 1. Đăng ký các Nodes (các bước hội thoại) vào đồ thị
    workflow.add_node("greeting", greeting_node)
    workflow.add_node("experience_review", experience_review_node)
    workflow.add_node("technical_questions", technical_questions_node)
    workflow.add_node("scenario_questions", scenario_questions_node)
    workflow.add_node("closing", closing_node)
    
    # 2. Thiết lập điểm vào kèm theo bộ định tuyến động route_interview
    workflow.set_conditional_entry_point(
        route_interview,
        {
            "greeting": "greeting",
            "experience_review": "experience_review",
            "technical_questions": "technical_questions",
            "scenario_questions": "scenario_questions",
            "closing": "closing",
            END: END
        }
    )
    
    # 3. Cấu hình để sau khi Node chạy xong, luồng đi sẽ trả kết quả về client (END turn)
    for node_name in ["greeting", "experience_review", "technical_questions", "scenario_questions", "closing"]:
        workflow.add_edge(node_name, END)
        
    return workflow.compile()
```

Bộ định tuyến quyết định thời điểm chuyển đổi giai đoạn dựa trên số lượng câu hỏi đã đặt:

```python
# File: ai-service/app/graph/router.py

def route_interview(state: InterviewState) -> str:
    current_stage = state.get("current_stage")
    count = state.get("stage_question_count", 0)
    chat_history = state.get("chat_history") or []
    
    # Đếm số lần ứng viên đã trả lời
    candidate_replies = [msg for msg in chat_history if msg.get("role") == "CANDIDATE"]
    
    if not current_stage:
        return "greeting"
        
    if current_stage == "GREETING":
        if len(candidate_replies) >= 1:
            return "experience_review" # Ứng viên nói câu đầu tiên -> bắt đầu khai thác kinh nghiệm
        return "greeting"
        
    elif current_stage == "EXPERIENCE_REVIEW":
        if count >= 3: # Hỏi đủ 3 câu về CV ứng viên -> chuyển sang hỏi kiến thức JD
            return "technical_questions"
        return "experience_review"
        
    elif current_stage == "TECHNICAL_QUESTIONS":
        if count >= 4: # Hỏi đủ 4 câu chuyên môn -> chuyển sang tình huống thực tế
            return "scenario_questions"
        return "technical_questions"
        
    elif current_stage == "SCENARIO_QUESTIONS":
        if count >= 3: # Hỏi đủ 3 câu tình huống -> kết thúc buổi phỏng vấn
            return "closing"
        return "scenario_questions"
        
    elif current_stage == "CLOSING":
        return END
```

## 3. Cơ Chế Chấm Điểm và Nhận Xét (Assessment)

Khi cuộc phỏng vấn kết thúc, một sự kiện `INTERVIEW_COMPLETED` được bắn qua RabbitMQ. `assessment-service` lập tức bắt lấy sự kiện để tạo báo cáo đánh giá.

### 3.1. Chống Ảo Giác AI bằng Xác thực Trích Dẫn (Citation Validation)
Một lỗi rất phổ biến khi dùng AI để chấm điểm là **AI tự nghĩ ra (ảo giác)** các câu trả lời mà ứng viên chưa từng nói để đưa vào báo cáo đánh giá nhằm chứng minh điểm số của mình là đúng.

Để giải quyết triệt để lỗi này, hệ thống của chúng ta thiết kế cơ chế **Citation Validation (Xác thực trích dẫn)**:
1.  Chúng ta yêu cầu Gemini trả về kết quả đánh giá kèm danh sách các trích dẫn nguyên văn (`citations`) chứng minh cho điểm số đó (trường `quote`).
2.  Sau khi nhận JSON từ Gemini, hệ thống tự động kiểm tra xem chuỗi trích dẫn (`quote`) đó **có thực sự tồn tại như một chuỗi con** trong các tin nhắn gốc của ứng viên trong lịch sử chat hay không.
3.  Nếu trích dẫn đó là giả (không khớp), hệ thống sẽ **loại bỏ trích dẫn** đó khỏi báo cáo để HR không bị đọc thông tin sai lệch.

### 3.2. Mã nguồn gọi API Gemini và Xác thực Trích dẫn trong `assessment-service`

Dưới đây là cách `LlmScorer` gọi REST API của Gemini và thực hiện xác thực:

```typescript
// File: assessment-service/src/scoring/llmScorer.ts

import { ChatMessage, ScoringResult } from './scorer';
import logger from '../utils/logger';

export function validateCitations(
  citations: any[],
  chatHistory: ChatMessage[]
): Array<{ quote: string; stage: string; dimension: string }> {
  if (!Array.isArray(citations)) return [];

  // Lấy ra tất cả tin nhắn thực tế của Ứng viên, viết thường và loại bỏ khoảng trắng thừa
  const candidateMessages = chatHistory
    .filter((m) => m.role === 'CANDIDATE')
    .map((m) => m.content.toLowerCase().replace(/\s+/g, ' ').trim());

  return citations
    .filter((cit) => {
      if (!cit || typeof cit !== 'object') return false;
      const quote = (cit.quote || '').toLowerCase().replace(/\s+/g, ' ').trim();
      
      // CHỈ GIỮ LẠI: Trích dẫn của AI phải khớp 100% với một phần tin nhắn của ứng viên
      return quote.length > 0 && candidateMessages.some((msg) => msg.includes(quote));
    })
    .map((cit) => ({
      quote: cit.quote.trim(),
      stage: cit.stage || 'TECHNICAL_QUESTIONS',
      dimension: cit.dimension || 'technical',
    }));
}

export class LlmScorer {
  async score(chatHistory: ChatMessage[], requirementsText?: string): Promise<any> {
    const apiKey = process.env.LLM_API_KEY;
    
    // Gọi API của Gemini bằng phương thức HTTP POST
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
    
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          role: 'user',
          parts: [{ text: `${SYSTEM_PROMPT}\n\n${userPrompt}` }],
        }],
        generationConfig: {
          responseMimeType: 'application/json', // Buộc Gemini trả về JSON đúng cấu trúc
          temperature: 0.2,                     // Giảm tính sáng tạo để điểm số được chuẩn hóa
        },
      }),
    });

    const data = await response.json();
    const jsonText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    const result = JSON.parse(jsonText);

    // Thực hiện kiểm tra chéo các trích dẫn (Citations)
    const validatedCitations = validateCitations(result.citations || [], chatHistory);

    return {
      scores: result.scores,
      summary: result.summary,
      strengths: result.strengths,
      weaknesses: result.weaknesses,
      recommendation: result.recommendation,
      citations: validatedCitations, // Chỉ chứa các trích dẫn thật 100%
      scoring_method: 'LLM'
    };
  }
}
```

1.  **Luôn lọc trùng lặp và phân mảnh ngữ cảnh:** RAG rất nhạy cảm với dữ liệu rác. Khi lưu trữ CV, cần thiết kế bộ chia text hợp lý để tránh việc LLM đọc phải các ký tự đặc biệt hoặc mã hex PDF bị lỗi.

# PHẦN 3: BẢO MẬT & GIÁM SÁT (SECURITY & MONITORING)

Chào mừng các bạn dev! Khi hệ thống chuyển dịch từ một server Monolith sang mô hình phân tán Microservices, hai bài toán khó khăn nhất xuất hiện là:
1.  **Làm sao để bảo mật hệ thống?** (Không thể cấu hình bảo mật thủ công trên từng service, cần cơ chế quản lý token an toàn và tập trung).
2.  **Làm sao để giám sát và phát hiện lỗi?** (Nếu một request bị lỗi, làm sao để biết nó bị lỗi ở service nào trong số các service đang chạy ngầm mà không cần phải lục tung log của từng container).

Tài liệu này sẽ giải thích chi tiết giải pháp **Bảo mật** và **Giám sát tập trung** đã được triển khai trong hệ thống **AI HR Recruiter**.

---

## 1. Cơ Chế Bảo Mật Toàn Diện (Security Architecture)

Kiến trúc bảo mật của chúng ta được chia làm 3 lớp chính: Chốt chặn Gateway, Xác thực ứng dụng (Auth Service), và Phòng chống tấn công đặc thù.

### 1.1. Cơ chế xoay vòng Refresh Token (Refresh Token Rotation - RTR)
Để duy trì phiên đăng nhập cho HR mà không bắt họ phải nhập mật khẩu liên tục, chúng ta dùng **Access Token** ngắn hạn (hết hạn sau 15 phút) và **Refresh Token** dài hạn (hết hạn sau 7 ngày).

Tuy nhiên, nếu hacker lấy trộm được Refresh Token, chúng có thể âm thầm tạo ra các Access Token mới để truy cập hệ thống trái phép. Để giải quyết, chúng ta sử dụng cơ chế **Xoay vòng Refresh Token (RTR)**:
- Mỗi khi client gửi Refresh Token cũ lên để đổi lấy Access Token mới, **Refresh Token cũ đó sẽ lập tức bị xóa bỏ/thu hồi khỏi Database**.
- Đồng thời, server sẽ trả về một **Refresh Token hoàn toàn mới** cùng Access Token mới.

#### Mã nguồn thực hiện RTR trong `authService.ts`:
```typescript
// File: core-service/src/services/authService.ts

export const authService = {
  async refresh(refreshToken: string, correlationId: string) {
    // 1. Tìm thông tin Refresh Token trong DB
    const record = await refreshTokenRepository.findByToken(refreshToken);

    if (!record) {
      throw new AppError(401, 'REFRESH_TOKEN_INVALID', 'Refresh token không tồn tại hoặc đã bị thu hồi.');
    }

    // 2. Nếu token đã hết hạn, xóa luôn và yêu cầu đăng nhập lại
    if (record.expiresAt < new Date()) {
      await refreshTokenRepository.deleteByToken(refreshToken);
      throw new AppError(401, 'REFRESH_TOKEN_EXPIRED', 'Refresh token đã hết hạn. Vui lòng đăng nhập lại.');
    }

    // 3. XOAY VÒNG: Xóa ngay lập tức token cũ để ngăn chặn việc sử dụng lại (Replay Attack)
    await refreshTokenRepository.deleteByToken(refreshToken);

    // 4. Tạo cặp Access Token và Refresh Token mới tinh
    const newAccessToken = generateAccessToken({
      sub: record.user.id,
      email: record.user.email,
      role: 'HR',
    });

    const newRawRefreshToken = generateRefreshToken(); // Tạo UUID v4 mới
    const expiresAt = new Date(Date.now() + config.jwt.refreshTokenExpiryMs);

    // 5. Lưu Refresh Token mới vào DB
    await refreshTokenRepository.create({
      token: newRawRefreshToken,
      user: { connect: { id: record.user.id } },
      expiresAt,
    });

    logger.info({
      event: 'auth.refresh',
      correlation_id: correlationId,
      userId: record.user.id,
    });

    return {
      accessToken: newAccessToken,
      refreshToken: newRawRefreshToken,
    };
  }
}
```

### 1.2. Phòng chống tấn công dò mật khẩu (Brute Force Lockout & Timing Attacks)
*   **Brute Force Lockout (Khóa tài khoản):** Trong file `authService.ts`, chúng ta xây dựng bộ theo dõi `lockoutStore`. Nếu một tài khoản HR đăng nhập sai quá **5 lần liên tiếp**, hệ thống tự động khóa tài khoản đó trong **15 phút**.
*   **Timing Attack Prevention (Chống tấn công đo lường thời gian):** Kẻ tấn công có thể gửi các request đăng nhập với email ngẫu nhiên để đo thời gian phản hồi của API. Nếu email có tồn tại, thời gian so khớp hash mật khẩu (bằng `bcrypt.compare`) sẽ lâu hơn đáng kể so với email không tồn tại (chỉ cần truy vấn DB rồi trả về ngay). Trong code của chúng ta, **ngay cả khi email không tồn tại trong DB, chúng ta vẫn chạy hàm so sánh giả lập với thời gian tương đương** để hacker không thể đoán biết email nào có thật trên hệ thống.

```typescript
// Dù có tìm thấy user hay không, hàm bcrypt.compare vẫn được chạy để giữ thời gian phản hồi ổn định
const passwordMatch = user && (await bcrypt.compare(password, user.passwordHash));
```

### 1.3. Cấu hình bảo mật tại API Gateway (Nginx)
API Gateway của chúng ta bổ sung các HTTP Header bảo mật tiêu chuẩn để bảo vệ trình duyệt của HR:
*   `X-Frame-Options "DENY"`: Ngăn chặn Clickjacking (không cho phép nhúng website vào thẻ iframe trên web lạ).
*   `X-Content-Type-Options "nosniff"`: Chặn tấn công MIME-sniffing (buộc trình duyệt tuân thủ định dạng file trả về từ server).
*   `Strict-Transport-Security (HSTS)`: Buộc mọi kết nối từ client phải chạy qua HTTPS.
*   **Rate Limiting:** Chỉ cho phép tối đa **100 requests/phút** từ mỗi IP nhằm ngăn chặn spam API và tấn công từ chối dịch vụ (DDoS).

## 2. Hệ Thống Giám Sát và Cảnh Báo (Observability Stack)

Hạ tầng giám sát của hệ thống sử dụng bộ công cụ nổi tiếng trong giới Microservices: **Prometheus, Grafana, Loki và Promtail**.

```mermaid
flowchart LR
    subgraph Services ["Các Dịch vụ"]
        Core[Core Service] -->|Ghi log JSON| LogFile[cv_storage & logs]
        AI[AI Service] -->|Ghi log JSON| LogFile
        Core -->|Expose /metrics| Prom[Prometheus]
        AI -->|Expose /metrics| Prom
    end

### 2.1. Prometheus & Grafana - Thu thập số liệu (Metrics)
Prometheus sử dụng cơ chế **Pull-based** để tự động "kéo" dữ liệu số liệu từ endpoint `/metrics` của các service sau mỗi 15 giây.

Chúng ta viết một Middleware đo lường và đăng ký nó trên toàn bộ các route của ứng dụng (trừ chính endpoint `/metrics` và `/health` để tránh tạo rác dữ liệu):

```typescript
// File: core-service/src/middlewares/metrics.ts

import client from 'prom-client';

// 1. Đo tổng số lượng HTTP request đi qua hệ thống
export const httpRequestCounter = new client.Counter({
  name: 'http_requests_total',
  help: 'Tổng số lượng HTTP requests',
  labelNames: ['method', 'route', 'status', 'service'],
});

// 2. Đo thời gian phản hồi của API (độ trễ - Latency)
export const httpRequestDuration = new client.Histogram({
  name: 'http_request_duration_seconds',
  help: 'Thời gian xử lý HTTP request bằng giây',
  labelNames: ['method', 'route', 'status', 'service'],
  buckets: [0.05, 0.1, 0.3, 0.5, 1, 2, 5, 10], // Các cột mốc thời gian cần đo
});

export const metricsMiddleware = (req: Request, res: Response, next: NextFunction) => {
  const start = process.hrtime();

  res.on('finish', () => {
    const diff = process.hrtime(start);
    const duration = diff[0] + diff[1] / 1e9; // Đổi sang giây

    if (req.path !== '/metrics' && req.path !== '/health') {
      const route = req.route ? req.route.path : req.path;
      const status = res.statusCode.toString();
      const method = req.method;

      // Tăng bộ đếm và ghi nhận thời gian
      httpRequestCounter.inc({ method, route, status, service: 'core-service' });
      httpRequestDuration.observe({ method, route, status, service: 'core-service' }, duration);
    }
  });

  next();
};
```

Khi kết nối Prometheus vào **Grafana**, ta có thể dễ dàng thiết lập biểu đồ hiển thị thời gian phản hồi trung bình (P99 Latency), tỷ lệ lỗi 5xx, và tổng lượng request theo thời gian thực.

### 2.2. Ghi Log Tập Trung với Loki & Promtail
Trong môi trường microservices, các container ghi log ra console hoặc các file log riêng lẻ nằm phân tán trong Docker volumes.

Để xử lý bài toán này:
1.  Mọi service đều ghi log ra file dạng **JSON có cấu trúc** chung dưới thư mục chia sẻ `/var/log/app/*.log`.
2.  **Promtail** (một agent gọn nhẹ) chạy ngầm, liên tục đọc file log này và chuyển đổi các trường dữ liệu JSON thành các nhãn (Labels) tìm kiếm.
3.  Promtail đẩy toàn bộ log về **Loki** để lưu trữ.

#### Cấu hình Promtail bóc tách log JSON:
```yaml
# File: monitoring/promtail/promtail-config.yml

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app-logs
          __path__: /var/log/app/*.log # Đường dẫn đọc file log chung
    pipeline_stages:
      # Phân tích cú pháp JSON để tự động bóc tách các trường làm nhãn tìm kiếm
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service: service
            correlation_id: correlation_id
            event: event
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          level:
          service:
          correlation_id: # Nhãn tìm kiếm cực kỳ quan trọng
```

### 2.3. Sức mạnh của Correlation ID trong vận hành
Nhờ cấu hình Promtail ở trên, trường `correlation_id` đã trở thành một nhãn chỉ mục trong Loki. 

Khi HR báo cáo một lỗi (ví dụ: upload CV thành công nhưng không thấy gửi thư mời phỏng vấn), Dev chỉ cần lấy `correlation_id` của request lỗi đó và chạy câu truy vấn trên Grafana:

```logql
{job="app-logs"} |= "req-abc-123-xyz"
```

Loki sẽ lập tức lọc ra toàn bộ hành trình của request này đi qua:
- `core-service` (lưu file CV và gửi sự kiện đi).
- `rag-service` (nhận sự kiện, phân tích PDF và lưu vector).
- `core-service` (nhận sự kiện hoàn thành).

Toàn bộ các bước được hiển thị theo đúng thứ tự thời gian trên một màn hình duy nhất, giúp việc cô lập và sửa lỗi diễn ra chỉ trong vài giây thay vì vài giờ!

## 3. Tóm tắt & Bài học kinh nghiệm cho Web Developer

1.  **JWT Access Token luôn đặt thời gian sống ngắn:** Đừng đặt access token kéo dài nhiều ngày. Hãy dùng access token 15 phút kết hợp cơ chế xoay vòng Refresh Token (RTR) để tối ưu tính bảo mật.
2.  **Cấu hình Rate Limit cho từng nhóm IP:** Hãy chắc chắn bạn giới hạn tốc độ truy cập API để tránh tình trạng hệ thống bị spam gây cạn kiệt tài nguyên gọi API LLM (Gemini).
3.  **Tập trung ghi log dạng cấu trúc (Structured Logging):** Hãy từ bỏ thói quen dùng `console.log("đã chạy tới đây")`. Sử dụng logger ghi log định dạng JSON với đầy đủ thông tin `event`, `service`, và `correlation_id` để Loki có thể phân tích hiệu quả nhất.

# PHẦN 4: KIỂM THỬ & VẬN HÀNH (TESTING & OPERATIONS)

Chào mừng các bạn dev! Khi phát triển một ứng dụng Monolith, việc kiểm thử thường khá trực diện: bạn chạy một DB cục bộ, khởi động ứng dụng và chạy các bộ kiểm thử hoặc click tay trên giao diện. Tuy nhiên, khi chuyển sang kiến trúc **Microservices**, mọi thứ trở nên phức tạp hơn rất nhiều:
1.  Các dịch vụ phụ thuộc chéo lẫn nhau thông qua mạng (HTTP hoặc RabbitMQ).
2.  Việc cài đặt môi trường phát triển đòi hỏi phải chạy đồng thời hàng chục container (App, Database, Queue, RAG Store, Monitoring).
3.  Làm sao để viết Unit Test cho một service mà không cần khởi chạy các service còn lại?

Trong tài liệu này, chúng ta sẽ khám phá chi tiết cách hệ thống **AI HR Recruiter** được thiết kế để giải quyết bài toán **Kiểm thử (Testing)** và **Vận hành (Operations)** một cách chuyên nghiệp và tự động.

## 1. Chiến Lược Kiểm Thử Trong Mô Hình Microservices (Testing Strategy)

Chúng ta chia chiến lược kiểm thử làm 3 cấp độ:
*   **Unit Test (Kiểm thử đơn vị):** Kiểm thử logic nghiệp vụ cô lập của một Service hoặc Class. Mọi giao tiếp ra ngoài (gọi DB, gọi REST API sang service khác) đều được **Mock** hoàn toàn.
*   **Integration Test (Kiểm thử tích hợp):** Kiểm thử sự phối hợp giữa router, middleware và database cục bộ của chính service đó.
*   **End-to-End (E2E) Test (Kiểm thử toàn trình):** Kiểm thử luồng nghiệp vụ hoàn chỉnh của toàn bộ hệ thống từ client đi qua API Gateway đến các microservice.

### 1.1. Kiểm thử trong Node.js (Jest + Supertest)

Với các dịch vụ viết bằng Node.js/TypeScript (`core-service` và `assessment-service`), chúng ta sử dụng **Jest** làm test runner và **Supertest** để giả lập các HTTP request trực tiếp vào Express app mà không cần khởi động server thật qua cổng TCP.

Để đảm bảo các bài test chạy nhanh và không bị ô nhiễm dữ liệu, toàn bộ các Repository kết nối cơ sở dữ liệu đều được Mock.

#### Ví dụ kiểm thử tích hợp Router & Middleware đăng ký với Supertest:
```typescript
// File: core-service/tests/integration/auth.test.ts

// 1. Mock Prisma Client và AuthRepository trước khi import App để tránh kết nối DB thật
jest.mock('../../src/repositories/prismaClient', () => ({
  __esModule: true,
  default: {
    $connect: jest.fn().mockResolvedValue(undefined),
    $disconnect: jest.fn().mockResolvedValue(undefined),
    $on: jest.fn(),
  },
}));

jest.mock('../../src/repositories/authRepository', () => ({
  userRepository: {
    findByEmail: jest.fn(),
    create: jest.fn(),
  },
}));

import request from 'supertest';
import app from '../../src/app';
import { userRepository } from '../../src/repositories/authRepository';

const MOCK_USER = {
  id: 'user-uuid-1',
  email: 'hr@example.com',
  passwordHash: 'hashed_password',
  fullName: 'HR Manager',
  role: 'HR' as const,
  createdAt: new Date(),
  updatedAt: new Date(),
};

describe('POST /api/auth/register', () => {
  afterEach(() => jest.clearAllMocks());

  it('trả về 201 cùng dữ liệu user khi đăng ký thành công', async () => {
    // Thiết lập hành vi giả lập cho repository
    (userRepository.findByEmail as jest.Mock).mockResolvedValue(null);
    (userRepository.create as jest.Mock).mockResolvedValue(MOCK_USER);

    // Dùng Supertest để gọi API giả lập
    const res = await request(app)
      .post('/api/auth/register')
      .send({ 
        email: 'hr@example.com', 
        password: 'password123', 
        fullName: 'HR Manager', 
        role: 'HR' 
      });

    // Kiểm tra kết quả
    expect(res.status).toBe(201);
    expect(res.body.success).toBe(true);
    expect(res.body.data.user.email).toBe('hr@example.com');
  });

  it('trả về 400 nếu thiếu trường bắt buộc (Middleware Validation hoạt động)', async () => {
    const res = await request(app)
      .post('/api/auth/register')
      .send({ email: 'test@example.com' }); // Thiếu password và fullName

    expect(res.status).toBe(400);
    expect(res.body.success).toBe(false);
    expect(res.body.error.code).toBe('VALIDATION_ERROR');
  });
});
```

### 1.2. Kiểm thử trong Python (Pytest + HTTPX + SQLAlchemy Mocking)

Với các dịch vụ viết bằng Python/FastAPI (`ai-service` và `rag-service`), chúng ta sử dụng **Pytest** và thư viện bất đồng bộ **Pytest-asyncio**.

#### Sử dụng Database In-Memory SQLite cho Integration Test:
Để test các câu lệnh SQL mà không cần cài đặt Postgres test riêng, chúng ta cấu hình Pytest sử dụng **SQLite in-memory** bất đồng bộ (`sqlite+aiosqlite:///:memory:`). Mỗi khi chạy test, SQLite sẽ tự động khởi tạo bảng cấu trúc từ SQLAlchemy Base và tự động hủy bỏ khi test xong, giúp môi trường kiểm thử cực kỳ sạch sẽ và độc lập.

```python
# File: ai-service/tests/conftest.py

import os
import pytest
import pytest_asyncio
from sqlalchemy.ext.asyncio import create_async_engine, async_sessionmaker, AsyncSession
from app.database import Base

# Ghi đè biến môi trường Database sang SQLite In-Memory trước khi import App
os.environ["DATABASE_URL"] = "sqlite+aiosqlite:///:memory:"

@pytest_asyncio.fixture
async def db_engine():
    """Tạo engine SQLite in-memory cho môi trường test."""
    engine = create_async_engine("sqlite+aiosqlite:///:memory:", echo=False)
    async with engine.begin() as conn:
        await conn.run_sync(Base.metadata.create_all) # Tạo cấu trúc bảng
    yield engine
    async with engine.begin() as conn:
        await conn.run_sync(Base.metadata.drop_all)
    await engine.dispose()

@pytest_asyncio.fixture
async def db_session(db_engine):
    """Cung cấp một phiên DB session độc lập cho từng ca test."""
    session_factory = async_sessionmaker(db_engine, class_=AsyncSession, expire_on_commit=False)
    async with session_factory() as session:
        yield session
```

#### Mock giao tiếp HTTP gọi chéo giữa các Microservices:
Trong `ai-service`, khi candidate gửi một mã token Magic Link để vào phỏng vấn, `ai-service` cần gọi HTTP POST sang `core-service` để xác thực token. Để test độc lập `ai-service`, chúng ta mock thư viện HTTP Client **HTTPX** để giả lập các kết quả trả về từ `core-service` (thành công, hết hạn, hoặc sập kết nối):

```python
# File: ai-service/tests/test_auth_service.py

import pytest
from unittest.mock import AsyncMock, patch, MagicMock
import httpx
from fastapi import HTTPException
from app.services.auth_service import validate_magic_token

@pytest.mark.asyncio
async def test_validate_token_success():
    """Test trường hợp token hợp lệ, trả về thông tin ứng viên."""
    mock_response = MagicMock()
    mock_response.status_code = 200
    mock_response.json.return_value = {
        "success": True,
        "data": {
            "application_id": "test-app-id",
            "candidate_name": "John Doe",
            "job_title": "Backend Engineer",
        },
    }

    # Patch AsyncClient của HTTPX để trả về mock response tự định nghĩa
    with patch("app.services.auth_service.httpx.AsyncClient") as mock_client_cls:
        mock_client = AsyncMock()
        mock_client.post.return_value = mock_response
        mock_client.__aenter__ = AsyncMock(return_value=mock_client)
        mock_client.__aexit__ = AsyncMock(return_value=False)
        mock_client_cls.return_value = mock_client

        result = await validate_magic_token("valid-token", "test-corr-id")

        assert result["application_id"] == "test-app-id"
        assert result["candidate_name"] == "John Doe"

@pytest.mark.asyncio
async def test_validate_token_core_service_unavailable():
    """Test khả năng phòng vệ: Khi Core Service bị sập mạng (ConnectError)"""
    with patch("app.services.auth_service.httpx.AsyncClient") as mock_client_cls:
        mock_client = AsyncMock()
        # Giả lập lỗi mất kết nối mạng
        mock_client.post.side_effect = httpx.ConnectError("Connection refused")
        mock_client.__aenter__ = AsyncMock(return_value=mock_client)
        mock_client.__aexit__ = AsyncMock(return_value=False)
        mock_client_cls.return_value = mock_client

        # Kiểm tra xem AI Service có chuyển thành lỗi 502 Bad Gateway hay không
        with pytest.raises(HTTPException) as exc_info:
            await validate_magic_token("any-token", "test-corr-id")
        assert exc_info.value.status_code == 502

### Các đoạn mã cốt lõi trong Script E2E:

#### 1. Lan truyền Correlation ID để theo dõi vết lỗi:
Trong E2E script, mọi request gửi đi đều được tự động gắn một mã UUID ngẫu nhiên làm `X-Correlation-ID`. Nhờ vậy, nếu kịch bản E2E bị lỗi ở bước nào, chúng ta chỉ cần tra cứu mã này trên Grafana/Loki để tìm ra nguyên nhân ngay lập tức.
```python
# Trích đoạn run_e2e.py: Hàm wrapper gửi HTTP request
def send_request(path, method="GET", data=None, headers=None, content_type="application/json"):
    url = f"{BASE_URL}{path}"
    if headers is None:
        headers = {}
    
    # Sinh và lan truyền Correlation ID
    corr_id = str(uuid.uuid4())
    headers["X-Correlation-ID"] = corr_id
    
    if data is not None:
        if isinstance(data, dict):
            req_data = json.dumps(data).encode("utf-8")
            headers["Content-Type"] = "application/json"
        else:
            req_data = data
            headers["Content-Type"] = content_type

    req = urllib.request.Request(url, data=req_data, headers=headers, method=method)
    
    # Bỏ qua xác thực chứng chỉ SSL tự ký (Self-signed) của môi trường Dev
    import ssl
    context = ssl._create_unverified_context()
    try:
        with urllib.request.urlopen(req, context=context) as response:
            res_body = response.read().decode("utf-8")
            return json.loads(res_body), response.status
    except urllib.error.HTTPError as e:
        # Trả về mã lỗi từ server
        return json.loads(e.read().decode("utf-8")), e.code
```

#### 2. Giả lập Upload File CV (Multipart Form Data):
Vì script E2E chạy độc lập bằng Python thuần (không dùng thư viện bên ngoài như `requests` để đảm bảo có thể chạy ở mọi môi trường), chúng ta tự viết hàm mã hóa dữ liệu multipart để tải file PDF lên:
```python
# Trích đoạn run_e2e.py: Tạo payload Multipart Form-data
def encode_multipart_formdata(fields, files):
    boundary = b'----WebKitFormBoundaryE2ETestBoundary'
    lines = []
    # Thêm các trường text thường
    for name, value in fields.items():
        lines.append(b'--' + boundary)
        lines.append(f'Content-Disposition: form-data; name="{name}"'.encode('utf-8'))
        lines.append(b'')
        lines.append(str(value).encode('utf-8'))
    # Thêm file nhị phân (PDF CV)
    for name, filepath in files.items():
        filename = os.path.basename(filepath)
        lines.append(b'--' + boundary)
        lines.append(f'Content-Disposition: form-data; name="{name}"; filename="{filename}"'.encode('utf-8'))
        lines.append(b'Content-Type: application/pdf')
        lines.append(b'')
        with open(filepath, 'rb') as f:
            lines.append(f.read())
    lines.append(b'--' + boundary + b'--')
    lines.append(b'')
    body = b'\r\n'.join(lines)
    content_type = f'multipart/form-data; boundary={boundary.decode("utf-8")}'
    return content_type, body
```

## 3. Điều Phối Hệ Thống Với Docker Compose (Docker Orchestration)

Để vận hành toàn bộ hệ thống gồm 10 dịch vụ (5 dịch vụ nghiệp vụ và 5 dịch vụ hạ tầng/giám sát) một cách trơn tru trên máy cục bộ của lập trình viên, chúng ta sử dụng công cụ **Docker Compose**.

Tập tin [docker-compose.yml](file:///Users/admin/01_Projects/Microservice/docker-compose.yml) được cấu hình tối ưu với các cơ chế:

### 3.1. Đồng bộ thứ tự khởi động (Service Dependencies & Healthchecks)
Một trong những lỗi kinh điển khi khởi chạy microservice bằng Docker Compose là: **Service khởi động và cố kết nối với Database hoặc RabbitMQ khi các hạ tầng này chưa sẵn sàng nhận kết nối**, dẫn đến container bị crash liên tục.

Chúng ta giải quyết triệt để lỗi này bằng cách cấu hình `healthcheck` cho hạ tầng và ràng buộc điều kiện khởi động `depends_on` với trạng thái `service_healthy`.

#### Cách thức khai báo trong `docker-compose.yml`:
```yaml
services:
  # ─── Hạ tầng Cơ sở ──────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Kiểm tra xem Postgres thực sự đã sẵn sàng nhận kết nối hay chưa
      test: ["CMD-SHELL", "pg_isready -U user -d core_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      # Dùng công cụ chẩn đoán có sẵn của RabbitMQ
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Dịch vụ Nghiệp vụ ──────────────────────────────────
  core-service:
    build: ./core-service
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/core_db
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      # Core Service CHỈ khởi chạy khi Postgres và RabbitMQ đã HEALTHY hoàn toàn
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
```

### 3.2. Phân vùng Mạng và Lưu trữ dữ liệu (Networks & Volumes)
*   **Mạng biệt lập (Isolated Network):** Theo mặc định, Docker Compose tự động tạo một mạng chung cho tất cả các dịch vụ. Nhờ vậy, `ai-service` có thể dễ dàng giao tiếp với `core-service` thông qua DNS nội bộ của Docker: `http://core-service:3001` thay vì phải cấu hình cứng địa chỉ IP.
*   **Chia sẻ dữ liệu tập tin (Shared Volumes):**
    *   `cv_storage`: Dùng chung giữa `core-service` (nơi nhận file upload) và `rag-service` (nơi đọc file PDF để phân tích text và tạo vector embeddings).
    *   `app_logs`: Toàn bộ các service ghi log JSON vào volume này để Promtail có thể truy cập và thu gom đẩy về Loki.
    *   `postgres_data` & `mongo_data` & `qdrant_data`: Giúp bảo toàn dữ liệu ứng dụng không bị mất đi mỗi khi container bị khởi động lại hoặc build lại.

## 4. Tóm Tắt & Best Practices Vận Hành Cho Web Developer

1.  **Luôn viết Healthcheck cho mọi Container:** Đừng bao giờ bỏ trống mục `healthcheck` trong file `docker-compose.yml`. Một container có cổng TCP đã mở chưa chắc logic bên trong đã hoạt động tốt (ví dụ mất kết nối DB ngầm).
2.  **Mock các kết nối mạng khi chạy Unit Test:** Tốc độ chạy unit test là yếu tố then chốt. Hãy mock triệt để các lệnh gọi API HTTP bằng `httpx` mock hoặc `nock` (Node.js) để bộ test có thể chạy xong dưới 5 giây mà không cần mạng Internet.
3.  **Tự động hóa E2E định kỳ:** E2E test là tấm khiên vững chắc nhất chống lại lỗi hồi quy (regression bugs). Hãy tích hợp file chạy kịch bản E2E (như `run_e2e.py`) vào luồng **CI/CD** (GitHub Actions, GitLab CI) để tự động chạy kiểm thử trước mỗi lần merge code lên nhánh chính.
4.  **Sử dụng Database cô lập (SQLite/InMemory) cho Integration Test:** Đừng dùng chung database phát triển (Development DB) để chạy test tích hợp. Việc tạo và xóa dữ liệu ngẫu nhiên của các ca test sẽ làm bẩn dữ liệu chạy thử của bạn.

                    <div class="code-header">
                        <span><i class="fa-solid fa-code"></i> ${lang.toUpperCase()}</span>
                        <button class="btn-copy" onclick="copyCode(this)"><i class="fa-regular fa-copy"></i> Copy</button>
                    </div>
                    <pre><code class="language-${lang}">${escapedCode}</code></pre>
                </div>
            `;
        };

        // Configure Marked options
        marked.setOptions({
            renderer: renderer,
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false
        });

        // Compile Markdown and Render Content
        document.addEventListener('DOMContentLoaded', async () => {
            const markdownSource = document.getElementById('markdown-source').text;
            const contentDiv = document.getElementById('content');
            
            // 1. Render Markdown to HTML
            contentDiv.innerHTML = marked.parse(markdownSource);
            
            // 2. Syntax Highlight
            hljs.highlightAll();
            
            // 3. Render Mermaid Diagrams
            try {
                await mermaid.run();
            } catch (err) {
                console.error("Mermaid rendering error: ", err);
            }

            // 4. Generate Table of Contents (TOC)
            buildTOC();
            
            // 5. Setup Scroll spy & UI listeners
            setupScrollSpy();
            setupUIListeners();
        });

        // Copy Code to Clipboard Function
        function copyCode(btn) {
            const codeEl = btn.closest('.code-wrapper').querySelector('pre code');
            const text = codeEl.innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fa-solid fa-check" style="color: var(--success);"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // Dynamic TOC Builder
        function buildTOC() {
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';
            
            // Select H1 and H2 inside Content
            const headers = document.querySelectorAll('#content h1, #content h2, #content h3');
            
            headers.forEach((header, index) => {
                const text = header.innerText.replace(/[\u2705\u274c]/g, '').trim(); // strip status emoji
                const tag = header.tagName.toLowerCase();
                
                // Ensure heading has an ID
                let id = header.id;
                if (!id) {
                    id = text.toLowerCase()
                              .replace(/[^a-zA-Z0-9\sđđáàảãạăắằẳẵặâấầẩẫậéèẻẽẹêếềểễệíìỉĩịóòỏõọôốồổỗộơớờởỡợúùủũụưứừửữựýỳỷỹỵ]/g, '')
                              .replace(/\s+/g, '-');
                    header.id = id;
                }
                
                const li = document.createElement('li');
                li.className = 'toc-item';
                
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.className = `toc-link level-${tag === 'h1' ? '1' : tag === 'h2' ? '2' : '3'}`;
                a.innerText = text;
                
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Scroll Spy Function to highlight active menu item on scroll
        function setupScrollSpy() {
            const sections = document.querySelectorAll('#content h1, #content h2');
            const tocLinks = document.querySelectorAll('.toc-link');
            
            window.addEventListener('scroll', () => {
                let current = '';
                const scrollPos = window.scrollY + 100;
                
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (scrollPos >= sectionTop) {
                        current = section.getAttribute('id');
                    }
                });
                
                tocLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === `#${current}`) {
                        link.classList.add('active');
                        // Auto-scroll TOC to keep active link in view
                        link.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });
            });
        }

        // UI Event Listeners
        function setupUIListeners() {
            // Sidebar Toggle on Mobile
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('toggle-sidebar');
            
            toggleBtn.addEventListener('click', (e) => {
                sidebar.classList.toggle('active');
                e.stopPropagation();
            });
            
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 1024 && !sidebar.contains(e.target) && e.target !== toggleBtn) {
                    sidebar.classList.remove('active');
                }
            });
            
            // Back to top button visibility
            const btnTop = document.getElementById('btn-top');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btnTop.classList.add('show');
                } else {
                    btnTop.classList.remove('show');
                }
            });
            
            btnTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Smooth scrolling for anchor links
            document.querySelectorAll('.toc-link').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetEl = document.getElementById(targetId);
                    
                    if (targetEl) {
                        // Scroll to element
                        window.scrollTo({
                            top: targetEl.offsetTop - 60,
                            behavior: 'smooth'
                        });
                        
                        // Close sidebar on mobile
                        if (window.innerWidth <= 1024) {
                            sidebar.classList.remove('active');
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
